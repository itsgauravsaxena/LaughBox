workflows:
  ios-app-store:
    name: iOS App Store Distribution
    max_build_duration: 60
    environment:
      xcode: 16.3
      ios_signing:
        distribution_type: app_store
        bundle_identifier: Mahim.LaughBox
      vars:
        BUNDLE_ID: "Mahim.LaughBox"
        XCODE_PROJECT: "LaughBox.xcodeproj"
        XCODE_SCHEME: "LaughBox"
        APPLE_TEAM_ID: "63QFK8962Z"
    scripts:
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build and archive
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$CM_BUILD_DIR/LaughBox.xcarchive" \
            archive
      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
